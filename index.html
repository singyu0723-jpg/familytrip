<style>
  :root {
    color-scheme: light;
    /* 預設桌機模式 — 深色背景 + 居中手機框 */
    --app-bg: radial-gradient(1200px 600px at 50% -10%, #2c2620 0%, #19150f 60%, #110e09 100%);
    --app-padding: 32px 16px;
  }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: 'Noto Sans TC', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior-y: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--app-padding);
    box-sizing: border-box;
    background: var(--app-bg);
  }
  #root { display: contents; }

  /* Hide scrollbar inside device but keep scrollable */
  .scroll-hide::-webkit-scrollbar { width: 0; height: 0; }
  .scroll-hide { scrollbar-width: none; }

  input, textarea, button, select {
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  button { cursor: pointer; }

  /* ───────────────────────────────────────────────
     手機模式 (≤ 820px) — 移除手機外框,全螢幕填滿
     ─────────────────────────────────────────────── */
  @media (max-width: 820px) {
    :root {
      --app-bg: #F5EFE4;
      --app-padding: 0;
    }
    html, body {
      width: 100%;
      overflow-x: hidden;
    }
    body {
      align-items: stretch;
      justify-content: stretch;
      min-height: 100vh;
      min-height: 100dvh;
    }
    /* 隱藏手機外框、Dynamic Island、Home Indicator、狀態列(用真的) */
    .device-frame {
      width: 100% !important;
      max-width: 100vw !important;
      height: auto !important;
      min-height: 100vh !important;
      min-height: 100dvh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      background: #F5EFE4 !important;
    }
    .device-frame > .device-island,
    .device-frame > .device-statusbar,
    .device-frame > .device-home-indicator {
      display: none !important;
    }
    /* 隱藏右側風格調整面板 */
    .tweaks-panel { display: none !important; }
    .app-outer {
      gap: 0 !important;
      width: 100% !important;
      max-width: 100vw !important;
    }
    .app-outer > * {
      max-width: 100vw !important;
    }
    /* 全域防止內容溢出 */
    .device-frame *,
    .device-frame *::before,
    .device-frame *::after {
      max-width: 100%;
      box-sizing: border-box;
    }
    /* 底部導航 — fixed 置底 */
    .bottom-nav {
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      width: 100% !important;
      padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px)) !important;
      z-index: 100 !important;
    }
    /* 螢幕內容區留白,避免被 fixed 底部導航擋住 */
    .screen-content {
      padding-bottom: calc(120px + env(safe-area-inset-bottom, 0px)) !important;
    }
    /* AppHeader 頂部留安全區 */
    .app-header {
      padding-top: calc(20px + env(safe-area-inset-top, 0px)) !important;
    }
  }

  /* 響應式內距 — 較窄的手機(iPhone SE / mini)更緊湊 */
  @media (max-width: 380px) {
    .screen-content { padding-left: 14px !important; padding-right: 14px !important; }
  }

  /* ───────────────────────────────────────────────
     A2HS 引導彈窗 — 從底部滑入
     ─────────────────────────────────────────────── */
  .a2hs-backdrop {
    position: fixed; inset: 0; z-index: 9998;
    background: rgba(0,0,0,0.35);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;

  .a2hs-card {

    body { background: #F5EFE4 !important; }
  }
</style>

<script>
  // A2HS 引導彈窗控制
  (function() {
    var STORAGE_KEY = 'a2hs_dismissed_v1';
    var SESSION_KEY = 'a2hs_shown_session';

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    }
    function isInStandaloneMode() {
      // iOS Safari 的 standalone 屬性
      return ('standalone' in window.navigator) && window.navigator.standalone === true
        || window.matchMedia('(display-mode: standalone)').matches;
    }
    function isSafari() {
      var ua = navigator.userAgent;
      // 排除 LINE/Facebook/Chrome iOS in-app browser
      if (/CriOS|FxiOS|EdgiOS|OPiOS|Line|FBAN|FBAV|Instagram/.test(ua)) return false;
      return /Safari/.test(ua);
    }

    var backdrop = document.getElementById('a2hs-backdrop');
    var card = document.getElementById('a2hs-card');
    var btnLater = document.getElementById('a2hs-later');
    var btnDismiss = document.getElementById('a2hs-dismiss');

    function showCard() {
      backdrop.classList.add('show');
      card.classList.add('show');
    }
    function hideCard() {
      backdrop.classList.remove('show');
      card.classList.remove('show');
    }
    function dismissForever() {
      try { localStorage.setItem(STORAGE_KEY, '1'); } catch(e) {}
      hideCard();
    }
    function dismissThisSession() {
      try { sessionStorage.setItem(SESSION_KEY, '1'); } catch(e) {}
      hideCard();
    }

    btnLater.addEventListener('click', dismissThisSession);
    btnDismiss.addEventListener('click', dismissForever);
    backdrop.addEventListener('click', dismissThisSession);

    // 判斷是否該顯示
    function maybeShow() {
      if (isInStandaloneMode()) return;       // 已經是主畫面開啟
      if (!isIOS() || !isSafari()) return;    // 只對 iOS Safari 顯示
      try {
        if (localStorage.getItem(STORAGE_KEY) === '1') return;   // 永久不再顯示
        if (sessionStorage.getItem(SESSION_KEY) === '1') return; // 本次 session 已關閉
      } catch(e) {}
      // 延遲 1.5 秒後彈出,避免太干擾
      setTimeout(showCard, 1500);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', maybeShow);
    } else {
      maybeShow();
    }
  })();
</script>

<script type="text/babel" data-presets="react">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';

        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>

          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>

          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>

}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

const FONT_SERIF   = '"Noto Serif TC", "Songti SC", "STSong", serif';
const FONT_SANS    = '"Noto Sans TC", -apple-system, system-ui, sans-serif';
const FONT_MONO    = '"DM Mono", ui-monospace, "SF Mono", monospace';
const FONT_BRUSH   = '"Ma Shan Zheng", "Long Cang", "Noto Serif TC", serif';
const FONT_DISPLAY = '"ZCOOL XiaoWei", "Noto Serif TC", serif';
const FONT_CURSIVE = '"Liu Jian Mao Cao", "Long Cang", cursive';

// ─────────────────────────────────────────────────────────────
// Decorative motifs
// ─────────────────────────────────────────────────────────────

// 印章 — square seal with single character (brush style)
function Seal({ char = '京', size = 44, color = C.red, style = {}, round = false, brush = true }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: round ? '50%' : 6,
      background: color, color: '#F5EFE4',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: brush ? FONT_BRUSH : FONT_SERIF, fontWeight: brush ? 400 : 600,
      fontSize: size * (brush ? 0.68 : 0.55),
      letterSpacing: -1,
      boxShadow: round
        ? `inset 0 0 0 2.5px rgba(245,239,228,0.85), inset 0 0 0 3.5px ${color}, 0 1px 0 rgba(0,0,0,0.05)`
        : 'inset 0 0 0 2px rgba(245,239,228,0.18), 0 1px 0 rgba(0,0,0,0.05)',
      position: 'relative',
      // subtle weathered texture overlay
      backgroundImage: `
        radial-gradient(circle at 25% 20%, rgba(245,239,228,0.18) 0%, transparent 25%),
        radial-gradient(circle at 75% 75%, rgba(0,0,0,0.12) 0%, transparent 30%),
        radial-gradient(circle at 60% 30%, rgba(0,0,0,0.08) 0%, transparent 20%)
      `,
      ...style,
    }}>
      <span style={{ position: 'relative', top: brush ? -2 : 1, lineHeight: 1 }}>{char}</span>
    </div>
  );
}

// 回紋 / 雷紋 — Greek key meander border (Chinese style)
function KeyMeanderBorder({ color = C.red, height = 14, style = {} }) {
  // tileable rectilinear spiral
  const svg = `
    <svg xmlns='http://www.w3.org/2000/svg' width='28' height='${height}' viewBox='0 0 28 ${height}'>
      <path d='M0 ${height-1} H6 V3 H22 V${height-3} H10 V7 H18 V${height-5} H14 V${height-7} M22 ${height-1} H28' 
        fill='none' stroke='${encodeURIComponent(color)}' stroke-width='1.2'/>
    </svg>`;
  return (
    <div style={{
      height, width: '100%',
      backgroundImage: `url("data:image/svg+xml;utf8,${svg.replace(/\n/g, '').replace(/#/g, '%23')}")`,
      backgroundRepeat: 'repeat-x',
      backgroundSize: `28px ${height}px`,
      opacity: 0.6,
      ...style,
    }} />
  );
}

// 山水 — distant mountain silhouette
function MountainSilhouette({ color = C.ink, opacity = 0.08, style = {} }) {
  return (
    <svg viewBox="0 0 360 60" preserveAspectRatio="none" style={{ width: '100%', height: 60, display: 'block', ...style }}>
      <path d="M0 60 L0 38 Q 20 30 35 36 Q 55 22 75 32 Q 95 18 120 30 Q 145 10 175 26 Q 200 16 225 28 Q 255 12 285 24 Q 315 18 340 30 Q 355 26 360 32 L360 60 Z"
        fill={color} opacity={opacity * 0.5}/>
      <path d="M0 60 L0 48 Q 30 40 60 46 Q 100 32 140 42 Q 180 30 220 40 Q 260 32 300 42 Q 330 36 360 44 L360 60 Z"
        fill={color} opacity={opacity}/>
    </svg>
  );
}

// 水波 — traditional wave pattern
function WavePattern({ color = C.indigo, opacity = 0.12, style = {} }) {
  const c = encodeURIComponent(color);
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='40' height='14' viewBox='0 0 40 14'>
    <path d='M0 7 Q 5 1, 10 7 T 20 7 T 30 7 T 40 7' fill='none' stroke='${c}' stroke-width='1.2'/>
    <path d='M0 12 Q 5 6, 10 12 T 20 12 T 30 12 T 40 12' fill='none' stroke='${c}' stroke-width='1' opacity='0.5'/>
  </svg>`;
  return (
    <div style={{
      height: 14, width: '100%', opacity,
      backgroundImage: `url("data:image/svg+xml;utf8,${svg.replace(/#/g, '%23')}")`,
      backgroundRepeat: 'repeat-x', backgroundSize: '40px 14px',
      ...style,
    }} />
  );
}

// 窗格 — lattice window pattern (subtle background)
function LatticeBg({ color = C.red, opacity = 0.05, style = {} }) {
  const c = encodeURIComponent(color);
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60' viewBox='0 0 60 60'>
    <g fill='none' stroke='${c}' stroke-width='0.8'>
      <rect x='10' y='10' width='40' height='40'/>
      <path d='M30 10 V 50 M 10 30 H 50'/>
      <path d='M20 20 L 30 10 L 40 20 L 30 30 Z'/>
      <path d='M20 40 L 30 30 L 40 40 L 30 50 Z'/>
      <path d='M20 20 L 10 30 L 20 40'/>
      <path d='M40 20 L 50 30 L 40 40'/>
    </g>
  </svg>`;
  return (
    <div style={{
      position: 'absolute', inset: 0, opacity, pointerEvents: 'none',
      backgroundImage: `url("data:image/svg+xml;utf8,${svg.replace(/#/g, '%23')}")`,
      backgroundRepeat: 'repeat', backgroundSize: '60px 60px',
      ...style,
    }} />
  );
}

// 毛筆筆觸 — brush stroke underline
function BrushStroke({ color = C.red, width = '100%', height = 8, style = {} }) {
  return (
    <svg viewBox="0 0 120 8" preserveAspectRatio="none"
      style={{ width, height, display: 'block', ...style }}>
      <path d="M2 5 Q 30 1, 60 4 T 118 3.5"
        stroke={color} strokeWidth="2.5" strokeLinecap="round" fill="none" opacity="0.9"/>
      <circle cx="118" cy="3.5" r="1.5" fill={color}/>
    </svg>
  );
}

// 雲紋 — cloud-curl divider with ink dot
function CloudDivider({ color = C.line2, dotColor = C.red, style = {} }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '4px 0', ...style }}>
      <div style={{ flex: 1, height: 1, background: `linear-gradient(to right, transparent, ${color} 60%)` }} />
      <svg width="58" height="12" viewBox="0 0 58 12" fill="none">
        <path d="M2 6 Q 8 2, 14 6 Q 20 10, 26 6" stroke={color} strokeWidth="1" strokeLinecap="round" fill="none"/>
        <path d="M32 6 Q 38 2, 44 6 Q 50 10, 56 6" stroke={color} strokeWidth="1" strokeLinecap="round" fill="none"/>
        <circle cx="29" cy="6" r="2" fill={dotColor}/>
      </svg>
      <div style={{ flex: 1, height: 1, background: `linear-gradient(to left, transparent, ${color} 60%)` }} />
    </div>
  );
}

// Vertical Chinese label (e.g. for headers)
function VerticalText({ text, size = 11, color = C.muted, style = {} }) {
  return (
    <div style={{
      writingMode: 'vertical-rl',
      fontFamily: FONT_SERIF, fontSize: size, color,
      letterSpacing: 4, lineHeight: 1,
      ...style,
    }}>{text}</div>
  );
}

// Section header with Chinese + small English subtitle
function SectionHeader({ zh, en, right }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between',
      padding: '4px 0 14px',
    }}>
      <div>
        <div style={{
          fontFamily: FONT_DISPLAY, fontSize: 22, fontWeight: 400, color: C.ink,
          letterSpacing: 3, lineHeight: 1,
        }}>{zh}</div>
        {en && <div style={{
          fontFamily: FONT_MONO, fontSize: 10, color: C.faint,
          letterSpacing: 2, marginTop: 6, textTransform: 'uppercase',
        }}>{en}</div>}
        <BrushStroke color={C.red} width={36} height={5} style={{ marginTop: 5, opacity: 0.7 }} />
      </div>
      {right}
    </div>
  );
}

// Card primitive
function Card({ children, style = {}, pad = 16, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: C.card,
      borderRadius: 14,
      border: `1px solid ${C.line}`,
      padding: pad,
      boxShadow: '0 1px 0 rgba(60,40,20,0.02), 0 4px 12px rgba(60,40,20,0.04)',
      ...style,
    }}>{children}</div>
  );
}

// Pill chip
function Chip({ children, color = C.red, light = true, style = {} }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center',
      padding: '3px 8px', borderRadius: 4,
      fontFamily: FONT_SANS, fontSize: 10, fontWeight: 500,
      letterSpacing: 1,
      background: light ? `${color}14` : color,
      color: light ? color : '#fff',
      border: light ? `1px solid ${color}30` : 'none',
      ...style,
    }}>{children}</span>
  );
}

// ─────────────────────────────────────────────────────────────
// Bottom Nav
// ─────────────────────────────────────────────────────────────
const TABS = [
  { id: 'plan',  zh: '行程', en: 'PLAN' },
  { id: 'tour',  zh: '導覽', en: 'TOUR' },
  { id: 'cost',  zh: '記帳', en: 'COST' },
  { id: 'list',  zh: '清單', en: 'LIST' },
  { id: 'info',  zh: '須知', en: 'INFO' },
];

function BottomNav({ active, onChange }) {
  return (
    <div className="bottom-nav" style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      paddingBottom: 28, paddingTop: 8,

      backdropFilter: 'blur(8px)',
      zIndex: 30,
    }}>
      <div style={{
        margin: '0 14px',
        background: C.card,
        borderRadius: 999,
        border: `1px solid ${C.line}`,
        boxShadow: '0 6px 20px rgba(60,40,20,0.08)',
        display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)',
        padding: 6,
      }}>
        {TABS.map(t => {
          const isActive = active === t.id;
          return (
            <button key={t.id}
              onClick={() => onChange(t.id)}
              style={{
                border: 'none', background: isActive ? C.ink : 'transparent',
                color: isActive ? C.paper : C.muted,
                borderRadius: 999, padding: '8px 0',
                display: 'flex', flexDirection: 'column', alignItems: 'center',
                gap: 1, transition: 'all 0.2s',
              }}>
              <span style={{
                fontFamily: FONT_SERIF, fontSize: 14, fontWeight: 600, letterSpacing: 2,
              }}>{t.zh}</span>
              <span style={{
                fontFamily: FONT_MONO, fontSize: 7, letterSpacing: 1.5,
                color: isActive ? 'rgba(245,239,228,0.6)' : C.faint,
              }}>{t.en}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// App-level header (paper-textured with traditional motifs)
function AppHeader({ tabId }) {
  const titles = {
    plan: { zh: '行程表', en: 'Itinerary · 9 Days', wm: '行' },
    tour: { zh: '深度導覽', en: 'Audio Guide',      wm: '遊' },

    <div className="app-header" style={{
      padding: '54px 22px 22px',
      background: `
        linear-gradient(180deg, ${C.paper2} 0%, ${C.paper} 100%)

      borderBottom: `1px solid ${C.line2}`,
      position: 'relative', overflow: 'hidden',
    }}>
      <LatticeBg color={C.red} opacity={0.04} />

      {/* brush calligraphy watermark */}
      <div style={{
        position: 'absolute', right: -6, top: 28,
        fontFamily: FONT_BRUSH, fontSize: 150, color: `${C.red}14`,
        fontWeight: 400, lineHeight: 1,
        pointerEvents: 'none', userSelect: 'none',
        transform: 'rotate(-4deg)',
      }}>{t.wm}</div>

      <div style={{
        display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 12,
        position: 'relative',
      }}>
        <div>
          <div style={{
            fontFamily: FONT_MONO, fontSize: 10, color: C.muted,
            letterSpacing: 3, textTransform: 'uppercase',
          }}>京 城 晉 韻 · 2026</div>
          <div style={{
            fontFamily: FONT_DISPLAY, fontSize: 34, fontWeight: 400,
            color: C.ink, letterSpacing: 4, lineHeight: 1.1, marginTop: 4,
          }}>{t.zh}</div>
          <div style={{
            fontFamily: FONT_MONO, fontSize: 10, color: C.faint,
            letterSpacing: 2, marginTop: 6, textTransform: 'uppercase',
          }}>{t.en}</div>
          <BrushStroke color={C.red} width={70} height={6} style={{ marginTop: 8 }} />
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'center', marginBottom: 4 }}>
          <Seal char={t.wm} size={44} color={C.red} round={true} style={{ transform: 'rotate(-3deg)' }} />
          <div style={{
            fontFamily: FONT_BRUSH, fontSize: 10, color: C.red, letterSpacing: 2,
            opacity: 0.7,
          }}>印</div>
        </div>
      </div>

      <KeyMeanderBorder color={C.red} style={{ position: 'absolute', left: 0, right: 0, bottom: 0 }} />
    </div>
  );
}

Object.assign(window, {
  C, FONT_SERIF, FONT_SANS, FONT_MONO, FONT_BRUSH, FONT_DISPLAY, FONT_CURSIVE,
  Seal, CloudDivider, VerticalText, SectionHeader, Card, Chip,
  KeyMeanderBorder, MountainSilhouette, WavePattern, LatticeBg, BrushStroke,
  TABS, BottomNav, AppHeader,
});

              <button key={p} onClick={() => setPayer(p)} style={{

function ListScreen() {
  const [checked, setChecked] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('ft_check') || '{}'); } catch { return {}; }
  });
  const [memo, setMemo] = React.useState(() => localStorage.getItem('ft_memo') || '');

  React.useEffect(() => { localStorage.setItem('ft_check', JSON.stringify(checked)); }, [checked]);
  React.useEffect(() => { localStorage.setItem('ft_memo', memo); }, [memo]);

  const toggle = (key) => setChecked(c => ({ ...c, [key]: !c[key] }));

  const totalItems = CHECKLIST_GROUPS.reduce((s, g) => s + g.items.length, 0);
  const doneItems = Object.values(checked).filter(Boolean).length;
  const pct = Math.round((doneItems / totalItems) * 100);

  return (
    <div style={{ padding: '20px 18px 140px' }} className="screen-content">
      {/* Progress card */}
      <Card style={{ marginBottom: 22, position: 'relative', overflow: 'hidden' }}>
        <LatticeBg color={C.red} opacity={0.04} />
        <div style={{
          position: 'absolute', right: -10, top: -16,
          fontFamily: FONT_BRUSH, fontSize: 130, color: `${C.red}1c`,
          fontWeight: 400, letterSpacing: 0, lineHeight: 1,
          transform: 'rotate(-3deg)',
        }}>備</div>
        <div style={{ position: 'relative' }}>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
            <div style={{ fontFamily: FONT_BRUSH, fontSize: 48, fontWeight: 400, color: C.red, lineHeight: 0.9 }}>
              {pct}<span style={{ fontFamily: FONT_SERIF, fontSize: 18, color: C.muted, marginLeft: 4, fontWeight: 600 }}>%</span>
            </div>
            <div style={{ fontFamily: FONT_SANS, fontSize: 12, color: C.muted, marginLeft: 'auto' }}>
              {doneItems} / {totalItems} 已完成
            </div>
          </div>
          <div style={{
            height: 6, background: C.paper2, borderRadius: 99, marginTop: 12,
            overflow: 'hidden', position: 'relative',
          }}>
            <div style={{
              position: 'absolute', left: 0, top: 0, bottom: 0,
              width: `${pct}%`, background: `linear-gradient(to right, ${C.red}, ${C.gold})`,
              borderRadius: 99, transition: 'width 0.3s',
            }} />
          </div>
          <button onClick={() => setChecked({})} style={{
            border: 'none', background: 'transparent', padding: 0,
            fontFamily: FONT_MONO, fontSize: 10, color: C.faint, letterSpacing: 1,
            marginTop: 10,
          }}>清空所有勾選</button>
        </div>
      </Card>

      {/* Checklist groups */}
      {CHECKLIST_GROUPS.map((g, gi) => (
        <div key={gi} style={{ marginBottom: 18 }}>
          <SectionHeader zh={g.title} en={`Group ${gi + 1}`} />
          <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.line}`, overflow: 'hidden' }}>
            {g.items.map((item, ii) => {
              const key = `${gi}-${ii}`;
              const isChecked = !!checked[key];
              return (
                <button key={ii} onClick={() => toggle(key)} style={{
                  width: '100%', border: 'none', background: 'transparent',
                  padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 12,
                  borderTop: ii > 0 ? `1px solid ${C.line}` : 'none',
                  textAlign: 'left',
                }}>
                  <div style={{
                    width: 22, height: 22, borderRadius: 5,
                    border: `1.5px solid ${isChecked ? C.red : C.line2}`,
                    background: isChecked ? C.red : 'transparent',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    flexShrink: 0, transition: 'all 0.15s',
                  }}>
                    {isChecked && <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                      <path d="M1 4.5L4 7.5L10 1" stroke={C.paper} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>}
                  </div>
                  <div style={{
                    flex: 1,
                    fontFamily: FONT_SANS, fontSize: 14,
                    color: isChecked ? C.faint : C.ink,
                    textDecoration: isChecked ? 'line-through' : 'none',
                  }}>{item}</div>
                </button>
              );
            })}
          </div>
        </div>
      ))}

      {/* Memo */}
      <SectionHeader zh="個人備忘錄" en="Personal Notes" />
      <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.line}`, padding: 14 }}>
        <textarea value={memo} onChange={e => setMemo(e.target.value)}
          placeholder="記下任何想記下的事⋯⋯"
          style={{
            width: '100%', boxSizing: 'border-box',
            border: 'none', outline: 'none', resize: 'vertical',
            background: 'transparent',
            fontFamily: FONT_SANS, fontSize: 14, color: C.ink,
            minHeight: 100, lineHeight: 1.7,
          }} />
        <div style={{
          fontFamily: FONT_MONO, fontSize: 10, color: C.faint,
          letterSpacing: 1, marginTop: 6, textAlign: 'right',
        }}>{memo.length} 字 · 自動儲存</div>
      </div>
    </div>
  );
}

            }}>{i + 1}</div>
            <div style={{ flex: 1, fontFamily: FONT_SANS, fontSize: 12.5, color: C.ink2, lineHeight: 1.7 }}>
              {it}
            </div>
          </div>
        ))}
      </div>
    </Card>
  );
}

Object.assign(window, { CostScreen, ListScreen, InfoScreen });

</script>
<script type="text/babel" data-presets="react">
// Main app + tweaks

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#B83A2A",
  "paper":  "#F5EFE4",
  "darkNav": true,
  "showStamps": true,
  "serifHeadings": true
}/*EDITMODE-END*/;

function App() {
  const [tab, setTab] = React.useState('plan');
  const [tweaks, setTweak] = useTweaks(DEFAULTS);

  // Apply tweaks to global C palette overrides (mutable)
  React.useEffect(() => {
    window.C.red = tweaks.accent;
    window.C.paper = tweaks.paper;
  }, [tweaks]);

  const screens = {
    plan: <PlanScreen />,
    tour: <TourScreen />,
    cost: <CostScreen />,
    list: <ListScreen />,
    info: <InfoScreen />,
  };

  return (
    <div className="app-outer" style={{ display: 'flex', gap: 24, alignItems: 'flex-start' }}>
      <IOSDevice width={402} height={874}>
        <div style={{
          background: tweaks.paper,
          minHeight: '100%',
          position: 'relative',
          fontFamily: '"Noto Sans TC", -apple-system, sans-serif',
          color: '#1A1612',
        }}>
          <AppHeader tabId={tab} />
          <div data-screen-label={`Tab ${tab}`}>
            {screens[tab]}
          </div>
          <BottomNav active={tab} onChange={setTab} />
        </div>
      </IOSDevice>

      <div className="tweaks-panel">
      <TweaksPanel title="風格調整">
        <TweakSection title="主色">
          <TweakColor
            label="朱紅 / 主色"
            value={tweaks.accent}
            onChange={(v) => setTweak('accent', v)}
            options={['#B83A2A', '#8E2A1E', '#C2410C', '#A55A3D', '#6B3A2A']}
          />
        </TweakSection>
        <TweakSection title="底色">
          <TweakColor
            label="紙張底色"
            value={tweaks.paper}
            onChange={(v) => setTweak('paper', v)}
            options={['#F5EFE4', '#F0E8D7', '#FAF6EE', '#EDE3CE', '#E8DEC4']}
          />
        </TweakSection>
        <TweakSection title="顯示">
          <TweakToggle label="深色底部導航" value={tweaks.darkNav}
            onChange={(v) => setTweak('darkNav', v)} />
          <TweakToggle label="顯示印章徽記" value={tweaks.showStamps}
            onChange={(v) => setTweak('showStamps', v)} />
          <TweakToggle label="標題使用宋體" value={tweaks.serifHeadings}
            onChange={(v) => setTweak('serifHeadings', v)} />
        </TweakSection>
      </TweaksPanel>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
